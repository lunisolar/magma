name: Release-Privately

on:
  # Triggered manually — no automated release runs.
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: 'Delete existing package versions before deploying (requires delete:packages scope on GH_PACKAGES_TOKEN)'
        type: boolean
        default: false

permissions:
  contents: write   # Required to commit and push version changes back to the repo.
  packages: write   # Required to publish to GitHub Packages within the organization.

concurrency:
  # Only one release at a time; never cancel an in-progress release.
  group: release-privately
  cancel-in-progress: false

jobs:
  release:
    name: Release-Privately
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # ── checkout & toolchain ──────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # Full history is needed so we can push commits back.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── pre-check ─────────────────────────────────────────────────────────────
      - name: Read current version
        id: version
        run: |
          CURRENT=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          # Expose whether this is a SNAPSHOT so later steps can skip version-bump work.
          if [[ "$CURRENT" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Current version: $CURRENT"

      # ── pre-build ─────────────────────────────────────────────────────────────
      - name: Pre-build — compile and test
        # Verify the full build is green *before* touching versions or pushing anything.
        run: mvn --batch-mode --no-transfer-progress clean verify

      # ── prepare-version ───────────────────────────────────────────────────────
      - name: Compute release version
        id: release_version
        run: |
          RELEASE="${{ steps.version.outputs.current }}"
          # If this is a SNAPSHOT, strip the suffix to get the release version.
          # If it is already a release version, use it as-is and skip version commits.
          RELEASE="${RELEASE%-SNAPSHOT}"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE"

      - name: Set release version in pom files
        # Only needed when starting from a SNAPSHOT — already a release version, nothing to change.
        if: steps.version.outputs.is_snapshot == 'true'
        run: |
          mvn --batch-mode versions:set \
            -DnewVersion=${{ steps.release_version.outputs.release }} \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true

      - name: Commit and push release version
        # Only needed when starting from a SNAPSHOT — already a release version, nothing to commit.
        if: steps.version.outputs.is_snapshot == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: release version ${{ steps.release_version.outputs.release }}"
          git push

      # ── build-release ─────────────────────────────────────────────────────────
      - name: Configure Maven settings for private GitHub Packages
        # Publishing to a different repository's package registry requires a PAT
        # with write:packages + read:packages scopes, stored as GH_PACKAGES_TOKEN.
        # GITHUB_TOKEN is scoped to this repository only and cannot publish elsewhere.
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github-private</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GH_PACKAGES_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Verify write access to private GitHub Packages registry
        # Fast pre-check: HEAD the versions URL — a 404 is fine (package doesn't exist yet),
        # a 401/403 means the token lacks write:packages and the deploy will fail.
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GH_PACKAGES_TOKEN }}" \
            "https://maven.pkg.github.com/${{ github.repository_owner }}/lunisolar-github-private-repo/")
          echo "Registry probe status: $STATUS"
          if [[ "$STATUS" == "401" || "$STATUS" == "403" ]]; then
            echo "::error::Cannot access GitHub Packages registry (HTTP $STATUS). Ensure GH_PACKAGES_TOKEN secret exists and has write:packages scope."
            exit 1
          fi

      - name: Delete existing package versions (force redeploy)
        # Requires delete:packages scope on GH_PACKAGES_TOKEN.
        # Lists all Maven packages in the org, finds versions matching the release version, and deletes them.
        if: inputs.force_redeploy == true
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          RELEASE="${{ steps.release_version.outputs.release }}"
          echo "Deleting existing package versions for $RELEASE ..."
          PACKAGES=$(gh api "/orgs/${{ github.repository_owner }}/packages?package_type=maven" \
            --paginate -q '.[].name')
          for PKG in $PACKAGES; do
            # Fetch all versions once so we can both find the target and count remaining versions.
            VERSIONS=$(gh api "/orgs/${{ github.repository_owner }}/packages/maven/$PKG/versions" \
              2>/dev/null || true)
            VERSION_ID=$(echo "$VERSIONS" | jq -r ".[] | select(.name == \"$RELEASE\") | .id")

            if [[ -n "$VERSION_ID" ]]; then
              TOTAL=$(echo "$VERSIONS" | jq 'length')
              if [[ "$TOTAL" -le 1 ]]; then
                # GitHub does not allow deleting the last version of a package —
                # the whole package must be deleted instead.
                echo "  Deleting entire package $PKG (only version is $RELEASE)"
                gh api --method DELETE \
                  "/orgs/${{ github.repository_owner }}/packages/maven/$PKG"
              else
                # Other versions exist, so we can safely delete just this one.
                echo "  Deleting $PKG @ $RELEASE (id: $VERSION_ID)"
                gh api --method DELETE \
                  "/orgs/${{ github.repository_owner }}/packages/maven/$PKG/versions/$VERSION_ID"
              fi
            fi
          done

      - name: Build, test and deploy to private GitHub Packages
        # Full build (compile → test → package → deploy).
        # Artifacts land in the GitHub Packages registry of lunisolar-github-private-repo.
        # The release repository comes from distributionManagement in magma-pom/pom.xml.
        # The snapshot repository is overridden here so ossrh (kept in pom.xml for OSS
        # releases) is never contacted by this private-release workflow.
        run: |
          mvn --batch-mode --no-transfer-progress clean deploy \
            -DaltSnapshotDeploymentRepository=github-private::https://maven.pkg.github.com/${{ github.repository_owner }}/lunisolar-github-private-repo

      - name: Upload build artifacts
        # Preserve JARs as workflow artifacts for auditing / manual inspection.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.release_version.outputs.release }}
          path: '**/target/*.jar'
          if-no-files-found: ignore

      # ── prepare-snapshot-version ──────────────────────────────────────────────
      - name: Compute next snapshot version
        id: next_snapshot
        # Only needed when we started from a SNAPSHOT — if the user triggered the workflow
        # on an already-released version there is no SNAPSHOT to advance to.
        # Version bumping rules:
        #   4.0.0   → 4.0.0.1-SNAPSHOT  (add 4th segment, starting at 1)
        #   4.0.0.1 → 4.0.0.2-SNAPSHOT  (increment existing 4th segment)
        if: steps.version.outputs.is_snapshot == 'true'
        run: |
          set -euo pipefail
          RELEASE="${{ steps.release_version.outputs.release }}"

          if [[ "$RELEASE" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            # 4-segment version — increment the last segment.
            BASE="${BASH_REMATCH[1]}"
            FOURTH="${BASH_REMATCH[2]}"
            NEXT="${BASE}.$((FOURTH + 1))-SNAPSHOT"
          elif [[ "$RELEASE" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            # 3-segment version — append the initial 4th segment.
            NEXT="${RELEASE}.1-SNAPSHOT"
          else
            echo "::error::Unrecognised release version format: $RELEASE"
            exit 1
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next snapshot version: $NEXT"

      - name: Set next snapshot version in pom files
        if: steps.version.outputs.is_snapshot == 'true'
        run: |
          mvn --batch-mode versions:set \
            -DnewVersion=${{ steps.next_snapshot.outputs.next }} \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true

      - name: Commit and push next snapshot version
        if: steps.version.outputs.is_snapshot == 'true'
        run: |
          git add .
          git commit -m "chore: prepare next development version ${{ steps.next_snapshot.outputs.next }}"
          git push
